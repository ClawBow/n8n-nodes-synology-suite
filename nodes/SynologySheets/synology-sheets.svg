<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background teal -->
  <rect width="512" height="512" fill="#1aa260" rx="80"/>
  
  <!-- Rotated white card -->
  <g transform="translate(256, 256) rotate(-8)">
    <rect x="-140" y="-140" width="280" height="280" fill="white" rx="40"/>
  </g>
  
  <!-- Spreadsheet grid icon with gradient -->
  <defs>
    <linearGradient id="sheetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1aa260;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#00d084;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#0093ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Grid cells -->
  <g transform="translate(256, 256)">
    <!-- Border -->
    <rect x="-80" y="-80" width="160" height="160" fill="none" stroke="url(#sheetGradient)" stroke-width="6" rx="8"/>
    
    <!-- Vertical lines -->
    <line x1="-26.67" y1="-80" x2="-26.67" y2="80" stroke="url(#sheetGradient)" stroke-width="5"/>
    <line x1="26.67" y1="-80" x2="26.67" y2="80" stroke="url(#sheetGradient)" stroke-width="5"/>
    
    <!-- Horizontal lines -->
    <line x1="-80" y1="-26.67" x2="80" y2="-26.67" stroke="url(#sheetGradient)" stroke-width="5"/>
    <line x1="-80" y1="26.67" x2="80" y2="26.67" stroke="url(#sheetGradient)" stroke-width="5"/>
    
    <!-- Highlight top-left cell -->
    <rect x="-80" y="-80" width="53.33" height="53.33" fill="url(#sheetGradient)" opacity="0.15"/>
  </g>
</svg>