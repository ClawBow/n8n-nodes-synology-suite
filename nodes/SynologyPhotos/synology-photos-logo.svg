    <!-- Photos inside -->
    <rect x="-60" y="-60" width="50" height="50" fill="#e9a733" rx="4"/>
    <circle cx="-35" cy="-45" r="6" fill="#002873"/>
    <polygon points="-60,-10 -40,-30 -30,-15" fill="#90ee90"/>
    <rect x="-8" y="-60" width="50" height="50" fill="#4CAF50" rx="4"/>
    <circle cx="17" cy="-45" r="6" fill="#002873"/>
    <polygon points="-8,-10 10,-30 20,-15" fill="#FFD700"/>
    <rect x="-60" y="-8" width="50" height="50" fill="#FF9800" rx="4"/>
