<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <rect width="256" height="256" fill="#f5f5f5"/>
  <g transform="translate(128,128)">
    <!-- Contact card -->
    <rect x="-70" y="-60" width="140" height="120" fill="#002873" rx="8" stroke="#e9a733" stroke-width="2"/>
    <!-- Avatar circle -->
    <circle cx="-40" cy="-30" r="20" fill="#e9a733"/>
    <circle cx="-40" cy="-35" r="8" fill="#002873"/>
    <path d="M -55 -15 Q -40 -8 -25 -15" fill="#002873"/>
    <!-- Contact info -->
    <text x="0" y="-35" font-family="Arial" font-size="14" fill="#e9a733" font-weight="bold">John Doe</text>
    <line x="-50" y="-25" x2="60" y2="-25" stroke="#e9a733" stroke-width="1" opacity="0.5"/>
    <text x="0" y="-15" font-family="Arial" font-size="10" fill="#cccccc">john@example.com</text>
    <text x="0" y="0" font-family="Arial" font-size="10" fill="#cccccc">+1 234 567 8900</text>
    <!-- Additional contacts hint -->
    <circle cx="35" cy="-30" r="18" fill="#FF9800" opacity="0.8"/>
    <circle cx="35" cy="-30" r="6" fill="#002873"/>
    <path d="M 30 -20 Q 35 -15 40 -20" fill="#002873"/>
    <circle cx="40" cy="20" r="18" fill="#4CAF50" opacity="0.8"/>
    <circle cx="40" cy="20" r="6" fill="#002873"/>
    <path d="M 35 30 Q 40 35 45 30" fill="#002873"/>
  </g>
</svg>
